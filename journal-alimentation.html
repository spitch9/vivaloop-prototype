<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&family=Fredoka:wght@500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <style>
    body {
      font-family: 'Nunito', system-ui, sans-serif;
      background: #000;
    }
    
    @keyframes slide-up {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes slide-in-right {
      from { opacity: 0; transform: translateX(40px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes bounce-in {
      0% { opacity: 0; transform: scale(0.5); }
      60% { opacity: 1; transform: scale(1.1); }
      100% { transform: scale(1); }
    }
    @keyframes float-gentle {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-6px); }
    }
    @keyframes pulse-progress {
      0%, 100% { box-shadow: 0 0 12px rgba(74, 222, 128, 0.6); }
      50% { box-shadow: 0 0 20px rgba(74, 222, 128, 0.9); }
    }
    @keyframes shine {
      0% { transform: translateX(-100%) skewX(-20deg); }
      100% { transform: translateX(200%) skewX(-20deg); }
    }
    
    .animate-slide-up { animation: slide-up 0.6s ease-out backwards; }
    .animate-slide-in-right { animation: slide-in-right 0.5s ease-out backwards; }
    .animate-bounce-in { animation: bounce-in 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) backwards; }
    .animate-float-gentle { animation: float-gentle 3s ease-in-out infinite; }
    .animate-pulse-progress { animation: pulse-progress 2s ease-in-out infinite; }
    
    .shine-effect::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      animation: shine 3s ease-in-out infinite;
      pointer-events: none;
    }
    
    .text-stroke { text-shadow: 0 2px 0 rgba(0, 0, 0, 0.25); }
    
    .btn-3d { position: relative; transition: transform 0.1s ease; }
    .btn-3d:active { transform: translateY(6px); }
    .btn-3d:active .btn-shadow { opacity: 0; }
    
    .answer-btn.selected .answer-card { transform: scale(1.02); }
    .answer-btn:not(.selected).has-selection { opacity: 0.4; transform: scale(0.97); }
    .answer-btn { transition: all 0.3s ease; }
    .answer-card { transition: transform 0.2s ease; }
    
    .selected-badge {
      opacity: 0;
      transform: scale(0.5);
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .selected .selected-badge { opacity: 1; transform: scale(1); }
    
    .continue-btn-disabled { opacity: 0.4; pointer-events: none; }
    .continue-btn-enabled { opacity: 1; pointer-events: auto; }
    
    ::-webkit-scrollbar { display: none; }
  </style>
</head>

  <script>
    lucide.createIcons();

    // ====== BANQUE DE QUESTIONS (Guide alimentaire canadien) ======
    // 16 questions pré-écrites, aucune IA. Le marqueur {…} indique le mot à surligner.
    const BANQUE_ALIMENTATION = [
      { id: "q_couleurs",           emoji_central: "🌈",
        question: "As-tu mis de la {couleur} dans ton assiette aujourd'hui ?",
        soustitre: "(Fruits ou légumes 🍎🥦)",
        oui: { emoji: "🥦🍎", label: "Oui, plein de couleurs !", souslabel: "Bravo, ton corps te remercie 💪" } },
      { id: "q_eau",                emoji_central: "💧",
        question: "As-tu bu assez d'{eau} aujourd'hui ?",
        soustitre: "(Au moins quelques verres 🥤)",
        oui: { emoji: "💦", label: "Oui, j'ai bien bu !", souslabel: "Hydratation au top 💪" } },
      { id: "q_fibres",             emoji_central: "🌾",
        question: "As-tu mangé un aliment à {grains entiers} aujourd'hui ?",
        soustitre: "(Pain, pâtes, riz brun, avoine)",
        oui: { emoji: "🍞", label: "Oui, des grains entiers !", souslabel: "Belle énergie longue durée 💪" } },
      { id: "q_sans_ecran",         emoji_central: "📵",
        question: "As-tu mangé au moins un repas {sans écran} ?",
        soustitre: "(Tablette, télé, téléphone)",
        oui: { emoji: "🍽️", label: "Oui, repas tout doux !", souslabel: "Goûter en pleine conscience 💪" } },
      { id: "q_pleine_conscience",  emoji_central: "🧘",
        question: "As-tu pris le temps de bien {savourer} un de tes repas ?",
        soustitre: "(Goûter, sentir, mâcher tranquillement)",
        oui: { emoji: "😋", label: "Oui, savouré chaque bouchée !", souslabel: "Tu as nourri ton corps et ton calme 💪" } },
      { id: "q_dejeuner",           emoji_central: "🌅",
        question: "As-tu {déjeuné} avant ta journée ?",
        soustitre: "(Pour démarrer en forme)",
        oui: { emoji: "🥣", label: "Oui, bien déjeuné !", souslabel: "L'énergie au rendez-vous 💪" } },
      { id: "q_legumes",            emoji_central: "🥦",
        question: "Y avait-il des {légumes} dans ton assiette aujourd'hui ?",
        soustitre: "(Cuits, crus, peu importe 🥕)",
        oui: { emoji: "🥕", label: "Oui, des légumes !", souslabel: "Belle dose de vitamines 💪" } },
      { id: "q_fruits",             emoji_central: "🍓",
        question: "As-tu mangé un {fruit} aujourd'hui ?",
        soustitre: "(Frais, congelé, en collation 🍌)",
        oui: { emoji: "🍎", label: "Oui, un fruit !", souslabel: "Vitamine et plaisir 💪" } },
      { id: "q_collation_saine",    emoji_central: "🥜",
        question: "Ta collation t'a-t-elle donné de l'{énergie} aujourd'hui ?",
        soustitre: "(Fruits, noix, yogourt, fromage)",
        oui: { emoji: "🧀", label: "Oui, super collation !", souslabel: "Carburant de qualité 💪" } },
      { id: "q_cuisiner",           emoji_central: "👩‍🍳",
        question: "As-tu aidé à {préparer} un repas ou une collation ?",
        soustitre: "(Couper, mélanger, servir 🥄)",
        oui: { emoji: "🍳", label: "Oui, j'ai cuisiné !", souslabel: "Bravo l'équipe en cuisine 💪" } },
      { id: "q_famille",            emoji_central: "👨‍👩‍👧",
        question: "As-tu {partagé} un repas avec quelqu'un aujourd'hui ?",
        soustitre: "(Famille, ami, à l'école)",
        oui: { emoji: "🍽️", label: "Oui, à plusieurs !", souslabel: "Manger ensemble, c'est doux 💪" } },
      { id: "q_decouverte",         emoji_central: "🌟",
        question: "As-tu goûté quelque chose de {nouveau} ou peu habituel ?",
        soustitre: "(Un fruit, un légume, une recette)",
        oui: { emoji: "🥭", label: "Oui, une découverte !", souslabel: "L'aventure du goût 💪" } },
      { id: "q_proteines",          emoji_central: "🥚",
        question: "As-tu mangé un aliment riche en {protéines} aujourd'hui ?",
        soustitre: "(Œuf, légumineuses, viande, tofu, yogourt)",
        oui: { emoji: "🥩", label: "Oui, des protéines !", souslabel: "Tes muscles disent merci 💪" } },
      { id: "q_assiette_equilibre", emoji_central: "🍱",
        question: "Ton assiette du midi avait-elle {un peu de tout} ?",
        soustitre: "(Légumes, féculents, protéines)",
        oui: { emoji: "🥗", label: "Oui, bien équilibrée !", souslabel: "Belle assiette colorée 💪" } },
      { id: "q_calme",              emoji_central: "🐢",
        question: "As-tu mangé {sans te presser} aujourd'hui ?",
        soustitre: "(Prendre son temps, mâcher)",
        oui: { emoji: "😌", label: "Oui, calmement !", souslabel: "Ton ventre te remercie 💪" } },
      { id: "q_ecoute_faim",        emoji_central: "👂",
        question: "As-tu {écouté ton corps} quand il a dit que c'était assez ?",
        soustitre: "(Arrêter quand on n'a plus faim)",
        oui: { emoji: "🤗", label: "Oui, à l'écoute !", souslabel: "Ton corps a un super radar 💪" } }
    ];

    // ====== OUTILS DATE ======
    function formaterDateLocale(d) {
      const a = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const j = String(d.getDate()).padStart(2, "0");
      return a + "-" + m + "-" + j;
    }

    // ====== ROTATION DE LA QUESTION ======
    function questionDuJour(donnees) {
      // Exclure les questions vues dans les 7 derniers jours
      const idsRecents = (donnees.journal || [])
        .map(function (j) { return j.alimentation && j.alimentation.question_id; })
        .filter(Boolean);

      // Exclure aussi la question affichée lors du passage précédent (évite la répétition immédiate)
      const stockee = donnees.question_alimentation_du_jour;
      if (stockee && stockee.question_id) {
        idsRecents.push(stockee.question_id);
      }

      const candidats = BANQUE_ALIMENTATION.filter(function (q) {
        return idsRecents.indexOf(q.id) === -1;
      });

      // Filet : si toute la banque est exclue, tout réouvrir
      const pool = candidats.length > 0 ? candidats : BANQUE_ALIMENTATION;
      const choisie = pool[Math.floor(Math.random() * pool.length)];

      // Mémoriser pour le prochain passage (servira d'exclusion)
      donnees.question_alimentation_du_jour = { question_id: choisie.id };
      VivaData.sauvegarder(donnees);
      return choisie;
    }

    // ====== AFFICHAGE ======
    function afficherQuestion(q) {
      document.getElementById("alim-emoji").textContent       = q.emoji_central;
      // Le mot entre accolades devient un span vert (text-emerald-300).
      const html = q.question.replace(/\{([^}]+)\}/g,
        '<span class="text-emerald-300">$1</span>');
      document.getElementById("alim-question").innerHTML      = html;
      document.getElementById("alim-soustitre").textContent   = q.soustitre;
      document.getElementById("alim-oui-emoji").textContent   = q.oui.emoji;
      document.getElementById("alim-oui-label").textContent   = q.oui.label;
      document.getElementById("alim-oui-souslabel").textContent = q.oui.souslabel;
    }

    // ====== CHARGEMENT ======
    let donnees = VivaData.charger();
    const questionCourante = questionDuJour(donnees);
    afficherQuestion(questionCourante);
    lucide.createIcons();

    // ====== LOGIQUE DE RÉPONSE (préservée + enregistrement) ======
    let currentAnswer = null;

    function selectAnswer(answer) {
      currentAnswer = answer;
      const btnYes = document.getElementById('btn-yes');
      const btnNo = document.getElementById('btn-no');
      const continueBtn = document.getElementById('continue-btn');

      btnYes.classList.remove('selected');
      btnNo.classList.remove('selected');
      btnYes.classList.add('has-selection');
      btnNo.classList.add('has-selection');

      if (answer === 'yes') {
        btnYes.classList.add('selected');
        btnYes.classList.remove('has-selection');
      } else {
        btnNo.classList.add('selected');
        btnNo.classList.remove('has-selection');
      }

      continueBtn.classList.remove('continue-btn-disabled');
      continueBtn.classList.add('continue-btn-enabled');

      lucide.createIcons();
    }

    function goToNext() {
      if (currentAnswer === null) return;

      // Enregistrer la réponse du jour pour le pilier alimentation.
      if (!donnees.journal_aujourdhui) donnees.journal_aujourdhui = {};
      donnees.journal_aujourdhui.alimentation = {
        question_id: questionCourante.id,
        reponse: (currentAnswer === 'yes') ? 'oui' : 'pas encore',
        date: formaterDateLocale(new Date())
      };
      VivaData.sauvegarder(donnees);

      document.body.style.transition = 'opacity 0.3s ease';
      document.body.style.opacity = '0.3';
      setTimeout(function () {
        window.location.href = 'journal-sommeil.html';
      }, 300);
    }
  </script>
</body>
