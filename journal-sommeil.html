<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vivaloop — Journal : Sommeil</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&family=Fredoka:wght@500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <style>
    body {
      font-family: 'Nunito', system-ui, sans-serif;
      background: #000;
    }
    
    /* === ANIMATIONS === */
    @keyframes slide-up {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes slide-in-right {
      from { opacity: 0; transform: translateX(40px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes float-gentle {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-6px); }
    }
    @keyframes float-stars {
      0%, 100% { transform: translateY(0px) rotate(0deg); opacity: 0.5; }
      50% { transform: translateY(-8px) rotate(15deg); opacity: 0.9; }
    }
    @keyframes pulse-progress {
      0%, 100% { box-shadow: 0 0 12px rgba(96, 165, 250, 0.6); }
      50% { box-shadow: 0 0 20px rgba(96, 165, 250, 0.9); }
    }
    @keyframes shine {
      0% { transform: translateX(-100%) skewX(-20deg); }
      100% { transform: translateX(200%) skewX(-20deg); }
    }
    @keyframes moon-glow {
      0%, 100% { filter: drop-shadow(0 0 12px rgba(147, 197, 253, 0.6)); }
      50% { filter: drop-shadow(0 0 20px rgba(147, 197, 253, 0.9)); }
    }
    @keyframes z-float {
      0% { transform: translateY(0) translateX(0) scale(0.8); opacity: 0; }
      30% { opacity: 1; }
      100% { transform: translateY(-30px) translateX(10px) scale(1.2); opacity: 0; }
    }
    @keyframes number-pop {
      0% { transform: scale(0.7); opacity: 0; }
      60% { transform: scale(1.15); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes total-glow {
      0%, 100% { box-shadow: 0 0 30px rgba(96, 165, 250, 0.4), inset 0 0 20px rgba(96, 165, 250, 0.1); }
      50% { box-shadow: 0 0 50px rgba(96, 165, 250, 0.7), inset 0 0 30px rgba(96, 165, 250, 0.2); }
    }
    
    .animate-slide-up { animation: slide-up 0.6s ease-out backwards; }
    .animate-slide-in-right { animation: slide-in-right 0.5s ease-out backwards; }
    .animate-float-gentle { animation: float-gentle 3s ease-in-out infinite; }
    .animate-float-stars { animation: float-stars 4s ease-in-out infinite; }
    .animate-pulse-progress { animation: pulse-progress 2s ease-in-out infinite; }
    .animate-moon-glow { animation: moon-glow 3s ease-in-out infinite; }
    .animate-z-float { animation: z-float 3s ease-in-out infinite; }
    .animate-number-pop { animation: number-pop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
    .animate-total-glow { animation: total-glow 3s ease-in-out infinite; }
    
    .shine-effect::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      animation: shine 3s ease-in-out infinite;
      pointer-events: none;
    }
    
    .text-stroke { text-shadow: 0 2px 0 rgba(0, 0, 0, 0.25); }
    
    /* Bouton 3D */
    .btn-3d { position: relative; transition: transform 0.1s ease; }
    .btn-3d:active { transform: translateY(6px); }
    .btn-3d:active .btn-shadow { opacity: 0; }
    
    /* Boutons +/- des sélecteurs d'heure */
    .time-btn {
      transition: all 0.15s ease;
      user-select: none;
    }
    .time-btn:active {
      transform: scale(0.85);
    }
    
    /* Boutons de ressenti (qualitatif) */
    .mood-btn { transition: all 0.25s ease; }
    .mood-btn.selected .mood-card {
      transform: scale(1.08) translateY(-4px);
      border-color: rgba(147, 197, 253, 0.7);
    }
    .mood-btn:not(.selected).has-selection {
      opacity: 0.45;
      transform: scale(0.95);
    }
    .mood-card { transition: all 0.25s ease; }
    
    /* Bouton continuer */
    .continue-btn-disabled { opacity: 0.4; pointer-events: none; }
    .continue-btn-enabled { opacity: 1; pointer-events: auto; }
    
    ::-webkit-scrollbar { display: none; }
  </style>
</head>

  <script>
    lucide.createIcons();
    
    // États initiaux
    let bedtime = { hour: 21, minute: 30 };
    let waketime = { hour: 7, minute: 0 };
    let selectedMood = null;
    
    // Ajustement des heures avec les boutons +/-
    function adjustTime(target, unit, delta) {
      const t = (target === 'bedtime') ? bedtime : waketime;
      
      if (unit === 'hour') {
        t.hour = (t.hour + delta + 24) % 24;
      } else {
        t.minute += delta;
        // Gestion du débordement des minutes (modulo 60 avec cascade vers les heures)
        while (t.minute >= 60) { t.minute -= 60; t.hour = (t.hour + 1) % 24; }
        while (t.minute < 0) { t.minute += 60; t.hour = (t.hour - 1 + 24) % 24; }
      }
      
      // Mise à jour de l'affichage avec animation
      const hourEl = document.getElementById(target + '-hour');
      const minEl = document.getElementById(target + '-minute');
      hourEl.textContent = String(t.hour).padStart(2, '0');
      minEl.textContent = String(t.minute).padStart(2, '0');
      
      // Petite animation pop sur le chiffre changé
      const animEl = (unit === 'hour') ? hourEl : minEl;
      animEl.classList.remove('animate-number-pop');
      void animEl.offsetWidth;
      animEl.classList.add('animate-number-pop');
      
      updateTotalSleep();
    }
    
    // Calcul du total de sommeil (gère le passage de minuit)
    function updateTotalSleep() {
      let bedMinutes = bedtime.hour * 60 + bedtime.minute;
      let wakeMinutes = waketime.hour * 60 + waketime.minute;
      
      // Si le réveil est avant le coucher (cas normal : 21h30 → 7h00 le lendemain)
      let totalMinutes;
      if (wakeMinutes <= bedMinutes) {
        totalMinutes = (24 * 60 - bedMinutes) + wakeMinutes;
      } else {
        // Cas inhabituel : coucher après minuit, réveil le même jour
        totalMinutes = wakeMinutes - bedMinutes;
      }
      
      const hours = Math.floor(totalMinutes / 60);
      const minutes = totalMinutes % 60;
      
      const totalEl = document.getElementById('total-sleep');
      totalEl.textContent = minutes === 0 ? `${hours}h` : `${hours}h${String(minutes).padStart(2, '0')}`;
      
      // Animation pop
      totalEl.classList.remove('animate-number-pop');
      void totalEl.offsetWidth;
      totalEl.classList.add('animate-number-pop');
      
      // Feedback contextuel sans jugement (respect Zimmerman)
      const feedbackEl = document.getElementById('sleep-feedback');
      let feedback = '';
      if (totalMinutes < 6 * 60) {
        feedback = '🌱 C\'est court, ton corps mérite plus';
      } else if (totalMinutes < 8 * 60) {
        feedback = '👌 Pas mal, mais tu peux mieux';
      } else if (totalMinutes < 10 * 60) {
        feedback = '✨ Belle nuit complète !';
      } else if (totalMinutes < 12 * 60) {
        feedback = '🌟 Super reposé(e), bravo !';
      } else {
        feedback = '😴 Beaucoup de sommeil, tu dois en avoir besoin';
      }
      feedbackEl.textContent = feedback;
    }
    
    // Sélection du ressenti
    function selectMood(mood, btn) {
      selectedMood = mood;
      
      document.querySelectorAll('.mood-btn').forEach(b => {
        b.classList.remove('selected');
        b.classList.add('has-selection');
      });
      btn.classList.add('selected');
      btn.classList.remove('has-selection');
      
      // Active le bouton continuer
      const continueBtn = document.getElementById('continue-btn');
      continueBtn.classList.remove('continue-btn-disabled');
      continueBtn.classList.add('continue-btn-enabled');
    }
    
    function goToNext() {
      if (selectedMood === null) return;
      
      document.body.style.transition = 'opacity 0.3s ease';
      document.body.style.opacity = '0.3';
      setTimeout(() => {
        window.location.href = 'journal-emotions.html';
      }, 300);
    }
  </script>
</body>
