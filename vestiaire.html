<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vivaloop — Le Vestiaire de Maya</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&family=Fredoka:wght@500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <style>
    body {
      font-family: 'Nunito', system-ui, sans-serif;
      background: #000;
    }
    
    /* === ANIMATIONS === */
    @keyframes slide-up {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes slide-down {
      from { opacity: 0; transform: translateY(-30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes float-gentle {
      0%, 100% { transform: translateY(0px) rotate(-2deg); }
      50% { transform: translateY(-8px) rotate(2deg); }
    }
    @keyframes coin-spin {
      0%, 100% { transform: rotateY(0deg) scale(1); }
      50% { transform: rotateY(180deg) scale(1.1); }
    }
    @keyframes coin-shine {
      0%, 100% { filter: drop-shadow(0 0 6px rgba(251, 191, 36, 0.6)); }
      50% { filter: drop-shadow(0 0 14px rgba(251, 191, 36, 1)); }
    }
    @keyframes podium-pulse {
      0%, 100% { transform: scaleX(1); opacity: 0.6; }
      50% { transform: scaleX(1.05); opacity: 0.9; }
    }
    @keyframes shine-sweep {
      0% { transform: translateX(-100%) skewX(-20deg); }
      100% { transform: translateX(200%) skewX(-20deg); }
    }
    @keyframes sparkle-twinkle {
      0%, 100% { opacity: 0.3; transform: scale(0.7) rotate(0deg); }
      50% { opacity: 1; transform: scale(1.2) rotate(180deg); }
    }
    @keyframes legendary-glow {
      0%, 100% { box-shadow: 0 0 16px rgba(251, 191, 36, 0.5), inset 0 0 12px rgba(251, 191, 36, 0.2); }
      50% { box-shadow: 0 0 28px rgba(251, 191, 36, 0.8), inset 0 0 20px rgba(251, 191, 36, 0.3); }
    }
    @keyframes save-pulse {
      0%, 100% { box-shadow: 0 0 20px rgba(34, 197, 94, 0.5), 0 8px 16px rgba(34, 197, 94, 0.3); }
      50% { box-shadow: 0 0 35px rgba(34, 197, 94, 0.7), 0 8px 20px rgba(34, 197, 94, 0.5); }
    }
    @keyframes selected-bounce {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.06); }
    }
    
    .animate-slide-up { animation: slide-up 0.6s ease-out backwards; }
    .animate-slide-down { animation: slide-down 0.5s ease-out backwards; }
    .animate-float-gentle { animation: float-gentle 4s ease-in-out infinite; }
    .animate-coin-shine { animation: coin-shine 2s ease-in-out infinite; }
    .animate-podium-pulse { animation: podium-pulse 3s ease-in-out infinite; }
    .animate-sparkle-twinkle { animation: sparkle-twinkle 2.5s ease-in-out infinite; }
    .animate-legendary-glow { animation: legendary-glow 2s ease-in-out infinite; }
    .animate-save-pulse { animation: save-pulse 2.5s ease-in-out infinite; }
    .animate-selected-bounce { animation: selected-bounce 1.5s ease-in-out infinite; }
    
    /* Effet shimmer sur les items rares/épiques */
    .item-shine::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: linear-gradient(135deg, transparent 30%, rgba(255,255,255,0.25) 50%, transparent 70%);
      animation: shine-sweep 3s ease-in-out infinite;
      pointer-events: none;
      border-radius: inherit;
    }
    
    .text-stroke { text-shadow: 0 2px 0 rgba(0, 0, 0, 0.25); }
    .text-stroke-strong { text-shadow: 0 2px 0 rgba(0, 0, 0, 0.4), 0 4px 8px rgba(0, 0, 0, 0.3); }
    
    .btn-3d { position: relative; transition: transform 0.1s ease; }
    .btn-3d:active { transform: translateY(4px); }
    .btn-3d:active .btn-shadow { opacity: 0; }
    
    /* Onglet de catégorie actif */
    .tab-btn { transition: all 0.2s ease; }
    .tab-btn.active .tab-card {
      background: linear-gradient(135deg, #f97316, #ea580c);
      border-color: rgba(254, 215, 170, 0.6);
      transform: scale(1.05);
      box-shadow: 0 8px 20px rgba(251, 146, 60, 0.5);
    }
    .tab-btn.active .tab-emoji { transform: scale(1.15); }
    .tab-btn.active .tab-label { color: white; }
    .tab-card { transition: all 0.2s ease; }
    .tab-emoji, .tab-label { transition: all 0.2s ease; }
    
    /* Item équipé visuellement */
    .item-equipped .item-card {
      border-color: rgba(74, 222, 128, 0.7) !important;
    }
    
    ::-webkit-scrollbar { display: none; }
  </style>
</head>

<body class="min-h-screen w-full flex items-center justify-center p-4">

  <!-- ====== CADRE TÉLÉPHONE ====== -->
  <div class="relative w-full max-w-[420px] h-[844px] rounded-[3rem] overflow-hidden border-[10px] border-zinc-900"
       style="box-shadow: 0 50px 100px -20px rgba(251, 146, 60, 0.3), 0 30px 60px -30px rgba(168, 85, 247, 0.4);">
    
    <!-- ====== FOND ANTHRACITE ====== -->
    <div class="absolute inset-0" style="background: linear-gradient(135deg, #0f1424 0%, #161b2e 50%, #1a1330 100%);">
      <div class="absolute -top-20 -left-20 w-72 h-72 bg-orange-500/15 rounded-full blur-3xl"></div>
      <div class="absolute top-1/3 -right-20 w-80 h-80 bg-purple-600/20 rounded-full blur-3xl"></div>
      <div class="absolute bottom-20 left-1/4 w-64 h-64 bg-amber-500/10 rounded-full blur-3xl"></div>
      
      <div class="absolute inset-0 opacity-30"
           style="background-image: radial-gradient(circle, rgba(255,255,255,0.08) 1px, transparent 1px); background-size: 24px 24px;">
      </div>
    </div>

    <!-- ====== CONTENU ====== -->
    <div class="relative h-full flex flex-col">
      
      <!-- Notch -->
      <div class="flex justify-center pt-3 pb-2 flex-shrink-0">
        <div class="w-32 h-6 bg-black rounded-full"></div>
      </div>

      <!-- ====== 1. EN-TÊTE - RESSOURCES ====== -->
      <div class="px-5 pt-2 pb-2 flex-shrink-0">
        
        <!-- Titre central -->
        <div class="flex justify-center mb-2 animate-slide-down" style="animation-delay: 0.05s;">
          <div class="bg-zinc-900/70 backdrop-blur-md rounded-2xl px-4 py-1.5 border border-orange-500/30">
            <h1 class="text-white font-black text-sm tracking-tight flex items-center gap-1.5">
              Le Vestiaire de Maya
              <span class="text-base">🎒</span>
            </h1>
          </div>
        </div>

        <!-- Niveau + Pièces -->
        <div class="flex justify-between items-center">
          
          <!-- Badge Niveau (gauche) -->
          <div class="animate-slide-down" style="animation-delay: 0.1s;">
            <div class="relative btn-3d cursor-pointer">
              <div class="btn-shadow absolute inset-0 bg-blue-900 rounded-2xl translate-y-1.5"></div>
              <div class="relative bg-gradient-to-br from-blue-400 via-blue-500 to-blue-700 rounded-2xl px-3.5 py-2 flex items-center gap-2 border-2 border-blue-300/40">
                <i data-lucide="star" class="w-4 h-4 text-yellow-300" style="fill: #fde047;"></i>
                <span class="text-white font-black text-sm tracking-wide text-stroke">NIVEAU 5</span>
              </div>
            </div>
          </div>

          <!-- Compteur de pièces (droite) -->
          <div class="animate-slide-down" style="animation-delay: 0.15s;">
            <div class="relative btn-3d cursor-pointer">
              <div class="btn-shadow absolute inset-0 bg-amber-900 rounded-2xl translate-y-1.5"></div>
              <div class="relative bg-gradient-to-br from-amber-300 via-amber-400 to-yellow-500 rounded-2xl px-3.5 py-2 flex items-center gap-2 border-2 border-amber-200/60">
                <span class="text-xl animate-coin-shine inline-block">💰</span>
                <span class="text-amber-900 font-black text-sm tracking-wide">1 250</span>
                <!-- Petit + pour acheter -->
                <div class="ml-1 w-5 h-5 bg-amber-900 rounded-full flex items-center justify-center border-2 border-amber-200">
                  <i data-lucide="plus" class="w-3 h-3 text-amber-300" stroke-width="4"></i>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- ====== 2. ZONE CENTRALE - PRÉVISUALISATION AVATAR ====== -->
      <div class="px-5 pt-3 pb-2 flex-shrink-0 animate-slide-up" style="animation-delay: 0.3s;">
        <div class="relative">
          <!-- Carte de prévisualisation -->
          <div class="relative bg-gradient-to-b from-purple-900/40 via-violet-950/60 to-zinc-900/40 backdrop-blur-sm rounded-3xl p-4 border-2 border-purple-500/20 overflow-hidden">
            
            <!-- Étincelles ambiantes -->
            <div class="absolute top-3 left-6 text-amber-300/60 text-xs animate-sparkle-twinkle" style="animation-delay: 0s;">✦</div>
            <div class="absolute top-8 right-5 text-amber-300/50 text-[10px] animate-sparkle-twinkle" style="animation-delay: 0.7s;">✧</div>
            <div class="absolute bottom-12 left-4 text-amber-300/60 text-xs animate-sparkle-twinkle" style="animation-delay: 1.4s;">✦</div>
            <div class="absolute bottom-8 right-8 text-amber-300/50 text-[10px] animate-sparkle-twinkle" style="animation-delay: 2.1s;">✧</div>
            
            <!-- Header : label "APERÇU" à gauche + bouton Enregistrer à droite -->
            <div class="relative flex items-center justify-between mb-1">
              <!-- Label -->
              <div class="bg-zinc-900/70 backdrop-blur-sm rounded-full px-2.5 py-0.5 border border-orange-400/30">
                <span class="text-orange-300 text-[9px] font-black tracking-widest">APERÇU EN TEMPS RÉEL</span>
              </div>
              
              <!-- Bouton Enregistrer (intégré dans la zone aperçu, logique avec l'avatar qu'on enregistre) -->
              <button onclick="enregistrer()" class="relative btn-3d">
                <div class="btn-shadow absolute inset-0 bg-green-900 rounded-xl translate-y-1"></div>
                <div class="relative bg-gradient-to-br from-green-400 via-emerald-500 to-green-600 rounded-xl px-3 py-1 border-2 border-green-300/50 flex items-center gap-1 animate-save-pulse">
                  <i data-lucide="check" class="w-3.5 h-3.5 text-white" stroke-width="3.5"></i>
                  <span class="text-white font-black text-[11px] tracking-wide text-stroke">Enregistrer</span>
                </div>
              </button>
            </div>

            <div class="relative flex items-center justify-center" style="height: 180px;">
              
              <!-- Halo magique géant derrière -->
              <div class="absolute inset-0 flex items-center justify-center">
                <div class="w-40 h-40 bg-gradient-radial from-purple-500/40 via-fuchsia-500/20 to-transparent rounded-full blur-2xl"></div>
              </div>
              
              <!-- Anneau orbital -->
              <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
                <div class="w-44 h-44 rounded-full border-2 border-dashed border-amber-400/20" style="animation: spin 25s linear infinite;"></div>
              </div>
              
              <!-- AVATAR DE MAYA -->
              <div class="relative z-10 flex flex-col items-center">
                <!-- Le renard avec accessoire actuel -->
                <div class="relative">
                  <!-- Halo coloré -->
                  <div class="absolute -inset-2 bg-gradient-to-br from-purple-500 via-fuchsia-500 to-orange-400 rounded-full blur-lg opacity-50"></div>
                  
                  <!-- Cercle d'avatar -->
                  <div class="relative w-32 h-32 rounded-full p-1 bg-gradient-to-br from-blue-400 via-purple-500 to-orange-400">
                    <div class="w-full h-full rounded-full bg-gradient-to-br from-violet-500 via-purple-600 to-indigo-700 flex items-center justify-center relative overflow-hidden border-4 border-zinc-900/40">
                      <!-- Reflet décoratif -->
                      <div class="absolute top-2 left-3 w-10 h-6 bg-white/20 rounded-full blur-md"></div>
                      
                      <!-- Renard qui flotte (sans accessoire superposé pour le prototype — en Phase 4, vrais sprites avec accessoires intégrés) -->
                      <span class="text-7xl animate-float-gentle select-none" style="filter: drop-shadow(0 8px 16px rgba(0,0,0,0.4));">🦊</span>
                    </div>
                  </div>
                </div>

                <!-- PODIUM / SOCLE -->
                <div class="mt-2 relative">
                  <!-- Lueur du podium -->
                  <div class="absolute inset-0 bg-amber-400/40 blur-lg rounded-full animate-podium-pulse"></div>
                  <!-- Podium effet 3D -->
                  <div class="relative">
                    <div class="w-24 h-2 bg-gradient-to-r from-transparent via-amber-300 to-transparent rounded-full"></div>
                    <div class="w-20 h-1 mx-auto bg-amber-200/40 rounded-full mt-0.5"></div>
                  </div>
                </div>

                <!-- Pseudo de l'avatar -->
                <div class="mt-2 relative">
                  <div class="absolute inset-0 bg-purple-900 rounded-full translate-y-1"></div>
                  <div class="relative bg-gradient-to-br from-purple-400 to-purple-600 rounded-full px-4 py-1 border-2 border-purple-300/50">
                    <span class="text-white font-black text-xs tracking-wider text-stroke">MAYA</span>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- ====== 3. ZONE DE SÉLECTION - INVENTAIRE ====== -->
      <div class="flex-1 overflow-hidden flex flex-col px-5 pt-1 pb-1">
        
        <!-- BARRE DE CATÉGORIES -->
        <div class="flex gap-2 mb-3 animate-slide-up" style="animation-delay: 0.45s;">
          
          <!-- Skins (actif par défaut) -->
          <button onclick="selectCategory('skins', this)" class="tab-btn active flex-1 btn-3d">
            <div class="btn-shadow absolute inset-0 bg-zinc-900 rounded-2xl translate-y-1.5"></div>
            <div class="tab-card relative bg-gradient-to-br from-zinc-700 to-zinc-800 rounded-2xl py-2 px-2 border-2 border-zinc-600/40 flex items-center justify-center gap-1.5">
              <span class="tab-emoji text-lg">👕</span>
              <span class="tab-label text-white/80 text-xs font-black tracking-wide">SKINS</span>
            </div>
          </button>

          <!-- Chapeaux -->
          <button onclick="selectCategory('hats', this)" class="tab-btn flex-1 btn-3d">
            <div class="btn-shadow absolute inset-0 bg-zinc-900 rounded-2xl translate-y-1.5"></div>
            <div class="tab-card relative bg-gradient-to-br from-zinc-700 to-zinc-800 rounded-2xl py-2 px-2 border-2 border-zinc-600/40 flex items-center justify-center gap-1.5">
              <span class="tab-emoji text-lg">🎩</span>
              <span class="tab-label text-white/80 text-xs font-black tracking-wide">CHAPEAUX</span>
            </div>
          </button>

          <!-- Accessoires -->
          <button onclick="selectCategory('accessories', this)" class="tab-btn flex-1 btn-3d">
            <div class="btn-shadow absolute inset-0 bg-zinc-900 rounded-2xl translate-y-1.5"></div>
            <div class="tab-card relative bg-gradient-to-br from-zinc-700 to-zinc-800 rounded-2xl py-2 px-2 border-2 border-zinc-600/40 flex items-center justify-center gap-1.5">
              <span class="tab-emoji text-lg">👓</span>
              <span class="tab-label text-white/80 text-xs font-black tracking-wide">ACCESS.</span>
            </div>
          </button>
        </div>

        <!-- GRILLE D'ITEMS (scrollable, avec padding-bottom suffisant pour ne pas être caché par la nav fixe) -->
        <div class="flex-1 overflow-y-auto" style="padding-bottom: 140px;">
          <div class="grid grid-cols-3 gap-2.5">
            
            <!-- ITEM 1 : T-shirt classique (POSSÉDÉ + ÉQUIPÉ) -->
            <button class="item-equipped relative btn-3d animate-slide-up" style="animation-delay: 0.55s;">
              <div class="btn-shadow absolute inset-0 bg-zinc-900 rounded-2xl translate-y-1.5"></div>
              <div class="item-card relative bg-gradient-to-br from-zinc-700 to-zinc-800 rounded-2xl p-2 border-2 border-green-400/70 overflow-hidden">
                
                <!-- Étiquette "ÉQUIPÉ" -->
                <div class="absolute top-1 right-1 z-10">
                  <div class="bg-green-500 rounded-full px-1.5 py-0 border border-green-300/60">
                    <span class="text-white text-[8px] font-black tracking-wider">ÉQUIPÉ</span>
                  </div>
                </div>

                <!-- Visuel de l'item -->
                <div class="aspect-square flex items-center justify-center mb-1 bg-zinc-900/60 rounded-xl border border-white/5">
                  <span class="text-4xl">👕</span>
                </div>
                
                <!-- Nom -->
                <p class="text-white/80 text-[10px] font-black text-center tracking-tight truncate">Classique</p>
                
                <!-- Action -->
                <div class="mt-1 flex justify-center">
                  <span class="text-green-400 text-[9px] font-black tracking-widest">✓ PORTÉ</span>
                </div>
              </div>
            </button>

            <!-- ITEM 2 : Hoodie magique (RARE - bordure bleue, possédé) -->
            <button class="relative btn-3d animate-slide-up" style="animation-delay: 0.6s;">
              <div class="btn-shadow absolute inset-0 bg-blue-950 rounded-2xl translate-y-1.5"></div>
              <div class="item-card item-shine relative bg-gradient-to-br from-blue-700 via-blue-800 to-indigo-900 rounded-2xl p-2 border-2 border-blue-400 overflow-hidden">
                
                <!-- Étiquette rareté -->
                <div class="absolute top-1 left-1 z-10">
                  <div class="bg-blue-500 rounded-md px-1 py-0 border border-blue-300/60">
                    <span class="text-white text-[8px] font-black tracking-wider">RARE</span>
                  </div>
                </div>

                <div class="aspect-square flex items-center justify-center mb-1 bg-blue-950/60 rounded-xl border border-blue-400/20">
                  <span class="text-4xl">🧥</span>
                </div>
                
                <p class="text-white text-[10px] font-black text-center tracking-tight truncate">Hoodie Tech</p>
                
                <!-- Bouton équiper -->
                <div class="mt-1 relative">
                  <div class="bg-white rounded-full py-0.5 border border-blue-300">
                    <span class="text-blue-700 text-[9px] font-black tracking-widest text-center block">ÉQUIPER</span>
                  </div>
                </div>
              </div>
            </button>

            <!-- ITEM 3 : Cape légendaire (ÉPIQUE - bordure violette, à acheter) -->
            <button class="relative btn-3d animate-slide-up" style="animation-delay: 0.65s;">
              <div class="btn-shadow absolute inset-0 bg-purple-950 rounded-2xl translate-y-1.5"></div>
              <div class="item-card item-shine relative bg-gradient-to-br from-purple-700 via-fuchsia-800 to-purple-900 rounded-2xl p-2 border-2 border-purple-400 overflow-hidden">
                
                <!-- Étiquette rareté -->
                <div class="absolute top-1 left-1 z-10">
                  <div class="bg-purple-500 rounded-md px-1 py-0 border border-purple-300/60">
                    <span class="text-white text-[8px] font-black tracking-wider">ÉPIQUE</span>
                  </div>
                </div>

                <!-- Petite étincelle -->
                <div class="absolute top-1 right-1 text-amber-300 text-xs animate-sparkle-twinkle z-10">✦</div>

                <div class="aspect-square flex items-center justify-center mb-1 bg-purple-950/60 rounded-xl border border-purple-400/30">
                  <span class="text-4xl">🦸</span>
                </div>
                
                <p class="text-white text-[10px] font-black text-center tracking-tight truncate">Cape Héros</p>
                
                <!-- Prix -->
                <div class="mt-1 flex items-center justify-center gap-0.5 bg-amber-400 rounded-full py-0.5 border border-amber-200">
                  <span class="text-xs">💰</span>
                  <span class="text-amber-900 text-[9px] font-black tracking-wide">450</span>
                </div>
              </div>
            </button>

            <!-- ITEM 4 : Veste rétro (RARE, à acheter) -->
            <button class="relative btn-3d animate-slide-up" style="animation-delay: 0.7s;">
              <div class="btn-shadow absolute inset-0 bg-blue-950 rounded-2xl translate-y-1.5"></div>
              <div class="item-card item-shine relative bg-gradient-to-br from-blue-700 via-blue-800 to-indigo-900 rounded-2xl p-2 border-2 border-blue-400 overflow-hidden">
                
                <div class="absolute top-1 left-1 z-10">
                  <div class="bg-blue-500 rounded-md px-1 py-0 border border-blue-300/60">
                    <span class="text-white text-[8px] font-black tracking-wider">RARE</span>
                  </div>
                </div>

                <div class="aspect-square flex items-center justify-center mb-1 bg-blue-950/60 rounded-xl border border-blue-400/20">
                  <span class="text-4xl">🧣</span>
                </div>
                
                <p class="text-white text-[10px] font-black text-center tracking-tight truncate">Écharpe Cosy</p>
                
                <div class="mt-1 flex items-center justify-center gap-0.5 bg-amber-400 rounded-full py-0.5 border border-amber-200">
                  <span class="text-xs">💰</span>
                  <span class="text-amber-900 text-[9px] font-black tracking-wide">200</span>
                </div>
              </div>
            </button>

            <!-- ITEM 5 : Gilet aventurier (ÉPIQUE) -->
            <button class="relative btn-3d animate-slide-up" style="animation-delay: 0.75s;">
              <div class="btn-shadow absolute inset-0 bg-purple-950 rounded-2xl translate-y-1.5"></div>
              <div class="item-card item-shine relative bg-gradient-to-br from-purple-700 via-fuchsia-800 to-purple-900 rounded-2xl p-2 border-2 border-purple-400 overflow-hidden">
                
                <div class="absolute top-1 left-1 z-10">
                  <div class="bg-purple-500 rounded-md px-1 py-0 border border-purple-300/60">
                    <span class="text-white text-[8px] font-black tracking-wider">ÉPIQUE</span>
                  </div>
                </div>

                <div class="absolute top-1 right-1 text-amber-300 text-xs animate-sparkle-twinkle z-10" style="animation-delay: 0.8s;">✦</div>

                <div class="aspect-square flex items-center justify-center mb-1 bg-purple-950/60 rounded-xl border border-purple-400/30">
                  <span class="text-4xl">🦺</span>
                </div>
                
                <p class="text-white text-[10px] font-black text-center tracking-tight truncate">Gilet Aventure</p>
                
                <div class="mt-1 flex items-center justify-center gap-0.5 bg-amber-400 rounded-full py-0.5 border border-amber-200">
                  <span class="text-xs">💰</span>
                  <span class="text-amber-900 text-[9px] font-black tracking-wide">600</span>
                </div>
              </div>
            </button>

            <!-- ITEM 6 : Costume légendaire (LÉGENDAIRE - bordure dorée animée) -->
            <button class="relative btn-3d animate-slide-up" style="animation-delay: 0.8s;">
              <div class="btn-shadow absolute inset-0 bg-amber-900 rounded-2xl translate-y-1.5"></div>
              <div class="item-card item-shine relative bg-gradient-to-br from-amber-500 via-orange-500 to-red-600 rounded-2xl p-2 border-2 border-amber-300 overflow-hidden animate-legendary-glow">
                
                <div class="absolute top-1 left-1 z-10">
                  <div class="bg-amber-500 rounded-md px-1 py-0 border border-amber-200">
                    <span class="text-white text-[8px] font-black tracking-wider">LÉGEND.</span>
                  </div>
                </div>

                <!-- Multi-étincelles légendaire -->
                <div class="absolute top-1 right-1 text-yellow-200 text-xs animate-sparkle-twinkle z-10">✦</div>
